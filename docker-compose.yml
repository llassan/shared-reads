services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharedreads
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sharedreads}
      POSTGRES_DB: sharedreads
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharedreads -d sharedreads"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    environment:
      DATABASE_URL: postgresql://sharedreads:${POSTGRES_PASSWORD:-sharedreads}@db:5432/sharedreads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:80"

volumes:
  pgdata:
